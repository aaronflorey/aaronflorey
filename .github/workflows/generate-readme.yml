name: Generate Profile README

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: generate-profile-readme
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate README
        run: bun run generate
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Update WakaTime stats output
        if: ${{ secrets.WAKATIME_API_KEY != '' }}
        id: waka
        uses: anmol098/waka-readme-stats@master
        env:
          DEBUG_RUN: True
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          SECTION_NAME: waka
          BADGE_STYLE: flat-square
          SHOW_UPDATED_DATE: "True"
          SHOW_LINES_OF_CODE: "False"
          SHOW_OS: "False"
          SHOW_PROJECTS: "False"
          SHOW_EDITORS: "False"
          SHOW_TIMEZONE: "False"
          SHOW_LANGUAGE_PER_REPO: "False"
          SHOW_SHORT_INFO: "False"
          SHOW_PROFILE_VIEWS: "False"
          SHOW_LOC_CHART: "False"

      - name: Merge WakaTime output into README
        if: ${{ steps.waka.outputs.README_CONTENT != '' }}
        run: bun run generate
        env:
          GITHUB_TOKEN: ${{ github.token }}
          WAKA_SECTION_CONTENT: ${{ steps.waka.outputs.README_CONTENT }}

      - name: Show missing WakaTime secret
        if: ${{ secrets.WAKATIME_API_KEY == '' }}
        run: echo "Set WAKATIME_API_KEY to enable the WakaTime section."

      - name: Commit generated README
        run: |
          git add README.md
          if git diff --cached --quiet; then
            echo "No README changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs(readme): refresh profile"
          git push
